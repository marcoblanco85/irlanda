<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irlanda - Noche Serena</title>
    <style>
        body {
            margin: 0;
            background-color: #020205;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <canvas id="miLienzo" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('miLienzo');
        const ctx = canvas.getContext('2d');

        // Configuración de Estrellas (Posiciones fijas para que no parpadeen caóticamente)
        const estrellas = [];
        for (let i = 0; i < 150; i++) {
            estrellas.push({
                x: Math.random() * canvas.width,
                y: Math.random() * 450,
                tam: Math.random() * 1.5,
                opacidad: Math.random()
            });
        }

        // Configuración de Flores
        const flores = [];
        const numFlores = 35;
        for (let i = 0; i < numFlores; i++) {
            flores.push({
                x: Math.random() * canvas.width,
                y: 490 + Math.random() * 90,
                escala: 1.2 + Math.random() * 0.8, 
                fase: Math.random() * Math.PI * 2,
                // Velocidad mucho más lenta (0.005 a 0.01)
                velocidad: 0.005 + Math.random() * 0.008 
            });
        }

        function dibujar(tiempo) {
            // 1. CIELO DEGRADADO
            const cielo = ctx.createLinearGradient(0, 0, 0, 450);
            cielo.addColorStop(0, "#000308");
            cielo.addColorStop(1, "#081221");
            ctx.fillStyle = cielo;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. ESTRELLAS ACOMODADAS
            estrellas.forEach(e => {
                ctx.fillStyle = `rgba(255, 255, 255, ${e.opacidad})`;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.tam, 0, Math.PI * 2);
                ctx.fill();
            });

            // 3. LUNA
            ctx.save();
            ctx.shadowBlur = 40;
            ctx.shadowColor = "rgba(255, 255, 255, 0.3)";
            ctx.beginPath();
            ctx.arc(650, 90, 45, 0, Math.PI * 2);
            ctx.fillStyle = "#fefce8";
            ctx.fill();
            ctx.restore();

            // 4. TEXTO
            ctx.fillStyle = "white";
            ctx.font = "lighter 85px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.letterSpacing = "20px";
            ctx.fillText("IRLANDA", canvas.width / 2, 160);

            // 5. PRADO VERDE OSCURO
            ctx.beginPath();
            ctx.moveTo(0, 460);
            ctx.quadraticCurveTo(canvas.width / 2, 420, canvas.width, 490);
            ctx.lineTo(canvas.width, 600);
            ctx.lineTo(0, 600);
            ctx.fillStyle = "#051204";
            ctx.fill();

            // 6. JARDÍN ANIMADO (MOVIMIENTO LENTO)
            flores.sort((a, b) => a.y - b.y);
            
            flores.forEach(f => {
                // Movimiento lateral reducido para simular brisa suave
                const oscilacion = Math.sin(tiempo * f.velocidad + f.fase) * 10;
                const florX = f.x + oscilacion;
                const florY = f.y - (45 * f.escala);
                
                // Tallo curvo
                ctx.strokeStyle = "#122b1e";
                ctx.lineWidth = 3 * f.escala;
                ctx.beginPath();
                ctx.moveTo(f.x, f.y);
                ctx.quadraticCurveTo(f.x + oscilacion * 0.5, f.y - 20, florX, florY);
                ctx.stroke();

                // Pétalos Turquesas
                ctx.fillStyle = "#40E0D0";
                for (let i = 0; i < 6; i++) {
                    ctx.save();
                    ctx.translate(florX, florY);
                    ctx.rotate((i * Math.PI * 2) / 6 + (oscilacion * 0.01));
                    ctx.beginPath();
                    ctx.ellipse(0, -9 * f.escala, 5 * f.escala, 14 * f.escala, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Brillo en el pétalo
                    ctx.fillStyle = "rgba(175, 238, 238, 0.6)";
                    ctx.beginPath();
                    ctx.ellipse(0, -10 * f.escala, 2 * f.escala, 7 * f.escala, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    ctx.fillStyle = "#40E0D0";
                }

                // Centro de la flor
                ctx.beginPath();
                ctx.arc(florX, florY, 4 * f.escala, 0, Math.PI * 2);
                ctx.fillStyle = "#008b8b";
                ctx.fill();
            });

            requestAnimationFrame(dibujar);
        }

        requestAnimationFrame(dibujar);
    </script>
</body>
</html>
