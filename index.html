<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Irlanda Mobile</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h, estrellas = [], flores = [];

        function init() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            // Menos estrellas para no saturar
            estrellas = Array.from({length: 80}, () => ({
                x: Math.random() * w,
                y: Math.random() * h * 0.6,
                s: Math.random() * 1.5,
                o: Math.random()
            }));

            // Flores adaptadas al ancho del móvil
            flores = Array.from({length: 20}, () => ({
                x: Math.random() * w,
                y: h * 0.85 + Math.random() * h * 0.1,
                f: Math.random() * 6,
                v: 0.002 + Math.random() * 0.005,
                e: 0.7 + Math.random() * 0.5
            }));
        }

        function draw(t) {
            // Fondo
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#00050a');
            grad.addColorStop(0.5, '#050a15');
            grad.addColorStop(1, '#0a1a0a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Estrellas
            estrellas.forEach(e => {
                ctx.fillStyle = `rgba(255,255,255,${e.o})`;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.s, 0, 7);
                ctx.fill();
            });

            // Luna pequeña arriba a la derecha
            ctx.fillStyle = '#fffde7';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'white';
            ctx.beginPath();
            ctx.arc(w * 0.8, h * 0.1, 20, 0, 7);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Texto Responsivo
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            // Clamp: mínimo 30px, máximo 60px según el ancho
            let fontSize = Math.max(30, Math.min(w * 0.12, 60));
            ctx.font = `100 ${fontSize}px sans-serif`;
            ctx.letterSpacing = "10px";
            ctx.fillText("IRLANDA", w / 2, h * 0.3);

            // Prado
            ctx.fillStyle = '#051005';
            ctx.beginPath();
            ctx.moveTo(0, h * 0.8);
            ctx.quadraticCurveTo(w / 2, h * 0.78, w, h * 0.85);
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.fill();

            // Flores (Simplificadas)
            flores.forEach(f => {
                let osc = Math.sin(t * f.v + f.f) * 8;
                let fx = f.x + osc;
                let fy = f.y - (30 * f.e);

                ctx.strokeStyle = '#0a2010';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(f.x, f.y);
                ctx.quadraticCurveTo(f.x + osc, f.y - 10, fx, fy);
                ctx.stroke();

                ctx.fillStyle = '#40E0D0';
                for(let i=0; i<5; i++) {
                    ctx.save();
                    ctx.translate(fx, fy);
                    ctx.rotate(i * 1.25 + (osc * 0.05));
                    ctx.beginPath();
                    ctx.ellipse(0, -5 * f.e, 3 * f.e, 8 * f.e, 0, 0, 7);
                    ctx.fill();
                    ctx.restore();
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
